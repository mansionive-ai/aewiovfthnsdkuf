10053: { text: '[종이 위의 시간]<br><br>"문자"란 뭐라고 생각하시나요..?<br>문자는 기적이에요!<br>문자를 알면 시간과 공간을 초월할 수 있거든요!<br>200년 전에 일어난 일로 눈물을 흘리고<br>천 년 전의 이야기에 웃을 수도 있어요.<br>우리 인생은 어쩔 수 없이 이 시대에 갇혀 있어요.<br>하지만 글을 읽을때 만큼은<br>과거의 위인들이 제게 말을 걸어 오는 느낌이죠<br>그 순간 만큼은 이 시대에서 벗어날 수 있어요.<br>글로 남겨진 생각은 이 세상에 계속 남아서<br>먼 훗날 누군가에게 영향을 줄 수 있어요<br>그건 마치.. 기적이 아니면 뭐겠어요?!<br><br>m = m', goto: 10034 },
10055: { text: '[10대를 위한 과학 수업]<br><br>!@#$%를 진화시키는 방법!<br>첫번째. ㅇㅅㅌㅅ 한방울.<br>두번째. ㅍㄴㅍㅌㄹㅇ 한방울.<br>세번째. ㅍㄹㅇㄷㅎㄷ 한방울.<br>네번째. ㅇㅅ 한방울.<br>다섯번째. ㅇㅁㄴㅇㅅ 한방울', goto: 10034 },
10057: { text: '★[기억을 걷는 사람]★<br><br>그는 남의 기억을 걸을 수 있었다.<br>꿈처럼 흐릿한 장면이 아니라, 흙의 감촉과 공기의 온도까지 또렷한 기억 속을.<br><br>사람들은 그를 기억을 걷는 사람이라 불렀다.<br><br>그가 하는 일은 단순했다.<br>너무 아파서 품고 살 수 없는 기억을 대신 걸어주는 것.<br>누군가의 과거를 끝까지 걸어 나오면, 그 기억은 주인에게서 조금 옅어졌다.<br><br>완전히 사라지지는 않았다.<br>상처가 흉터로 남듯, 기억도 흔적은 남겼다.', goto: 10034 },

      ${pageVideos[currentPage] ? `<video id="pageVideo" loop style="${pageVideoStyles[currentPage] || 'width:500px;'}"><source src="${pageVideos[currentPage]}" type="video/mp4"></video>` : ""}
   ${pageImages[currentPage] ? `<img src="${pageImages[currentPage]}" style="${pageImageStyles[currentPage] || defaultImageStyle}" oncontextmenu="return false;" draggable="false">` : ""}
<p style="${textStyle}">${pageText}</p>
    `;

   
    if (pageVideos[currentPage]) {
      const video = document.getElementById('pageVideo');
      if (video) {
        video.muted = !audioUnlocked;
        video.play().catch(() => {
          video.muted = true;
          video.play().catch(() => {});
        });
      }
    }
  }
}
wrap.addEventListener('click', () => {

  if (codePages.includes(currentPage)) {
    if (pageHistory.length > 0) {
      currentPage = pageHistory.pop();
      localStorage.setItem("currentPage", currentPage);
      localStorage.setItem("pageHistory", JSON.stringify(pageHistory));
      showPage();
    }
    return;
  }
  
  if (pageChoices[currentPage] || currentPage === 158) return;
  
 
  if (sensitivePageIds.includes(currentPage)) {
    const pageData = sensitivePagesCache[currentPage];
    if (pageData && pageData.goto) {
      pageHistory.push(currentPage);
      currentPage = pageData.goto;
      localStorage.setItem("currentPage", currentPage);
      localStorage.setItem("pageHistory", JSON.stringify(pageHistory));
      showPage();
    }
    return;
  }
  
  if (currentPage === 0) {
   const saved = localStorage.getItem("currentPage");
    audio.play().catch(() => {});
    audioUnlocked = true;
    
   if (saved && saved > 0) {
  currentPage = parseInt(saved);
  const savedHistory = localStorage.getItem("pageHistory");
  if (savedHistory) {
    pageHistory = JSON.parse(savedHistory);
  }
  const savedName = localStorage.getItem("playerName");
  if (savedName) {
    playerName = savedName;
  }
   
      const lastBGM = localStorage.getItem("lastBGM");
      if (lastBGM) {
        audio.src = lastBGM;
        audio.play().catch(() => {});
      }
    } else {
     
      currentPage = 1;
      localStorage.setItem("currentPage", currentPage);
    }
    
    showPage();
    return;
  }
  const pageData = pages[currentPage];
  

  if (typeof pageData === 'object' && pageData.goto) {
    pageHistory.push(currentPage);
    currentPage = pageData.goto;
    localStorage.setItem("currentPage", currentPage);
    localStorage.setItem("pageHistory", JSON.stringify(pageHistory));
    showPage();
    return;
  }


  if (pages[currentPage + 1]) {
    pageHistory.push(currentPage); 
    currentPage++;
    localStorage.setItem("currentPage", currentPage);
    localStorage.setItem("pageHistory", JSON.stringify(pageHistory)); 
    showPage();
  }
});

document.getElementById("backBtn").addEventListener("click", () => {
  if (pageHistory.length > 0) {
  
    currentPage = pageHistory.pop();
    localStorage.setItem("currentPage", currentPage);
    localStorage.setItem("pageHistory", JSON.stringify(pageHistory));
    showPage();
  } else if (currentPage > 0) {
  
    currentPage--;
    localStorage.setItem("currentPage", currentPage);
    showPage();
  }
});

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") {
    if (pageHistory.length > 0) {
    
      currentPage = pageHistory.pop();
      localStorage.setItem("currentPage", currentPage);
      localStorage.setItem("pageHistory", JSON.stringify(pageHistory));
      showPage();
    } else if (currentPage > 0) {
    
      currentPage--;
      localStorage.setItem("currentPage", currentPage);
      showPage();
    }
} else if (e.key === "ArrowRight" && !codePages.includes(currentPage) && !pageChoices[currentPage] && currentPage !== 158) {  const pageData = pages[currentPage];
    
    if (typeof pageData === 'object' && pageData.goto) {
      pageHistory.push(currentPage);
      currentPage = pageData.goto;
      localStorage.setItem("currentPage", currentPage);
      localStorage.setItem("pageHistory", JSON.stringify(pageHistory));
      showPage();
    } else if (pages[currentPage + 1]) {
      pageHistory.push(currentPage);  
      currentPage++;
      localStorage.setItem("currentPage", currentPage);
      localStorage.setItem("pageHistory", JSON.stringify(pageHistory)); 
      showPage();
    }
  }
}); 

showPage();
